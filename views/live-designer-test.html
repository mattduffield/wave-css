<!DOCTYPE html>
<html lang="en" class="theme-ocean dark h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Designer</title>
  <link rel="stylesheet" href="../dist/wave-css.min.css">
  <style>
    body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  </style>
</head>
<body>
  <wc-live-designer
    canvas-url="./live-designer-canvas.html"
    api-base-url="http://localhost:8080"
    theme="theme-ocean dark">
  </wc-live-designer>

  <script type="module" src="../dist/wave-css.min.js"></script>
  <script>
    setTimeout(() => {
      const designer = document.querySelector('wc-live-designer');
      if (designer) {
        designer.setSampleData({
          first_name: 'Jane',
          last_name: 'Doe',
          email: 'jane.doe@example.com',
          phone_number: '(555) 123-4567',
          gender: 'female',
          age: 32,
          status: 'active',
          amount: 1500.00,
          is_active: true,
          title: 'Sample Article Title',
          description: 'This is a sample description for testing the live designer.',
          category: 'news',
          release_date: '2026-03-23',
          notes: 'Some notes here...',
          address: {
            street: '123 Main Street',
            city: 'Charlotte',
            state: 'NC',
            postal_code: '28202'
          },
          household_members: [
            { first_name: 'Jane', middle_initial: 'M', last_name: 'Doe' },
            { first_name: 'John', middle_initial: 'A', last_name: 'Doe' }
          ],
          created_by: 'admin',
          created_date: '2026-01-15T10:30:00Z',
          modified_by: 'admin',
          modified_date: '2026-03-20T14:22:00Z'
        });
      }
    }, 2000);
  </script>

  <wc-event-hub></wc-event-hub>
</body>
</html>
