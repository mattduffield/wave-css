<!doctype html>
<html lang="en" class="h-full theme-ocean dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave CSS - wc-color</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,300italic,700,700italic">
  <script src="https://unpkg.com/htmx.org@2.0.2"></script>
  <script src="https://unpkg.com/hyperscript.org@0.9.12"></script>

  <link rel="stylesheet" href="../dist/wave-css.min.css">
</head>

<body class="col-1 h-full text-sm">
  <div id="page-contents" class="p-6" style="max-width: 620px; margin: 0 auto;">
    <h1 class="text-xl font-bold mb-4">wc-color</h1>
    <p class="mb-6 text-muted">
      Color picker form field: swatch + value, native picker, optional presets. Submits a normal
      named value in the chosen <code>format</code> (hex by default).
    </p>

    <div class="col-1 gap-8">
      <div class="card p-4 col-1 gap-3">
        <h2 class="text-base font-semibold">Hex (with presets) — seeded value</h2>
        <wc-form>
          <wc-color
              name="label_color"
              lbl-label="Label Color"
              format="hex"
              value="#3b82f6"
              swatches='["#ef4444","#f59e0b","#22c55e","#3b82f6","#a855f7"]'
              required>
          </wc-color>
          <wc-color
              name="accent_rgb"
              lbl-label="Accent (rgb format)"
              format="rgb"
              value="rgb(34, 197, 94)">
          </wc-color>
          <wc-color
              name="brand"
              lbl-label="Brand (presets only)"
              allow-custom="false"
              swatches='["#0ea5e9","#14b8a6","#f43f5e"]'>
          </wc-color>
          <div class="row gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Save (logs payload)</button>
          </div>
        </wc-form>
        <pre id="out" class="card p-3 text-xs" style="white-space:pre-wrap;"></pre>
      </div>
    </div>
  </div>

  <script type="module" src="../dist/wave-css.min.js"></script>
  <script type="module">
    document.querySelector('wc-form').querySelector('form, .wc-form')?.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const obj = {};
      for (const [k, v] of fd.entries()) obj[k] = v;
      document.getElementById('out').textContent = JSON.stringify(obj, null, 2);
    });
  </script>
</body>
</html>
