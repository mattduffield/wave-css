<!DOCTYPE html>
<html lang="en" class="theme-ocean">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Designer Canvas</title>
  <link rel="stylesheet" href="../dist/wave-css.min.css">
  <style>
    body { margin: 0; padding: 0; min-height: 100vh; }
    #editor-canvas { min-height: 100vh; padding: 1rem; position: relative; }
    #editor-canvas:not(:has([data-designer-id]))::after {
      content: 'Drag components here to start designing';
      display: flex; justify-content: center; align-items: center;
      min-height: 200px; color: var(--text-6); font-size: 0.875rem;
    }

    /* ===============================================
       EDIT MODE — natural rendering + subtle affordances
       Components render as they would in production.
       Designer adds: hover outlines, drop hints, labels.
       =============================================== */

    /* All designer elements need position:relative for selection outline */
    [data-designer-id] {
      position: relative;
    }

    /* display:contents elements need a box for selection/drop — BUT
       let components that manage their own child visibility (wc-tab,
       wc-tab-item, wc-accordion, wc-dropdown) keep their natural display.
       We only force display:block on simple wrappers like div, wc-form. */
    div[data-designer-id].contents,
    wc-form[data-designer-id].contents,
    wc-breadcrumb[data-designer-id].contents,
    fieldset[data-designer-id].contents {
      display: block !important;
    }

    /* wc-tab, wc-tab-item, wc-accordion, wc-dropdown, etc. render naturally.
       Their .contents class still needs a box for the label badge, but
       we do NOT override display — let the component handle show/hide. */
    wc-tab[data-designer-id].contents,
    wc-tab-item[data-designer-id].contents,
    wc-accordion[data-designer-id].contents,
    wc-dropdown[data-designer-id].contents,
    wc-sidebar[data-designer-id].contents,
    wc-sidenav[data-designer-id].contents,
    wc-slideshow[data-designer-id].contents,
    wc-split-button[data-designer-id].contents,
    wc-flip-box[data-designer-id].contents,
    wc-menu[data-designer-id].contents {
      display: contents !important;
    }

    /* Subtle hover outline on all designer elements */
    [data-designer-id]:hover {
      outline: 1px dashed rgba(100, 170, 255, 0.3);
      outline-offset: -1px;
    }

    /* Empty containers: min-height so they are droppable + hint text */
    [data-designer-container]:not(:has([data-designer-id]))::after {
      content: 'Drop components here';
      display: flex; justify-content: center; align-items: center;
      min-height: 60px;
      color: rgba(100, 170, 255, 0.3);
      font-size: 11px; font-family: system-ui, sans-serif;
    }

    /* Empty inner wrappers also show drop hint */
    [data-designer-container] > .wc-form:not(:has([data-designer-id]))::after,
    [data-designer-container] > .wc-div:not(:has([data-designer-id]))::after,
    [data-designer-container] > .wc-tab > .tab-body:not(:has([data-designer-id]))::after,
    [data-designer-container] > .wc-tab-item:not(:has([data-designer-id]))::after {
      content: 'Drop components here';
      display: flex; justify-content: center; align-items: center;
      min-height: 60px;
      color: rgba(100, 170, 255, 0.25);
      font-size: 11px; font-family: system-ui, sans-serif;
    }

    /* Design time: the 'hidden' utility class should not hide content.
       Skeletons use hidden + JS transition, but in the designer we show everything. */
    [data-designer-id].hidden {
      display: flex !important;
      visibility: visible !important;
    }

    /* Skeletons: render as compact static indicators in the designer.
       Hide the animated skeleton content and show a simple label instead. */
    wc-article-skeleton[data-designer-id] .wc-article-skeleton,
    wc-table-skeleton[data-designer-id] .wc-table-skeleton,
    wc-card-skeleton[data-designer-id] .wc-card-skeleton,
    wc-list-skeleton[data-designer-id] .wc-list-skeleton {
      display: none !important;
    }
    wc-article-skeleton[data-designer-id],
    wc-table-skeleton[data-designer-id],
    wc-card-skeleton[data-designer-id],
    wc-list-skeleton[data-designer-id] {
      display: flex !important;
      align-items: center;
      justify-content: center;
      min-height: 32px !important;
      max-height: 32px !important;
      background: var(--surface-3, #2a2a3a) !important;
      border: 1px dashed rgba(100, 170, 255, 0.3) !important;
      border-radius: 4px !important;
      overflow: hidden !important;
    }
    wc-article-skeleton[data-designer-id]::after { content: '⏳ Article Skeleton'; }
    wc-table-skeleton[data-designer-id]::after { content: '⏳ Table Skeleton'; }
    wc-card-skeleton[data-designer-id]::after { content: '⏳ Card Skeleton'; }
    wc-list-skeleton[data-designer-id]::after { content: '⏳ List Skeleton'; }
    wc-article-skeleton[data-designer-id]::after,
    wc-table-skeleton[data-designer-id]::after,
    wc-card-skeleton[data-designer-id]::after,
    wc-list-skeleton[data-designer-id]::after {
      font-size: 11px; color: rgba(100, 170, 255, 0.6);
      font-family: system-ui, sans-serif;
    }

    /* Prevent form interaction at design time */
    [data-designer-id] input,
    [data-designer-id] select,
    [data-designer-id] textarea,
    [data-designer-id] button { pointer-events: none; }

    /* Full page preview mode — enable all interactions, hide edit chrome */
    .preview-mode [data-designer-id] input,
    .preview-mode [data-designer-id] select,
    .preview-mode [data-designer-id] textarea,
    .preview-mode [data-designer-id] button { pointer-events: all !important; }
    .preview-mode [data-designer-id]:hover { outline: none !important; }
    .preview-mode [data-designer-id].designer-selected { outline: none !important; }
    .preview-mode [data-designer-container] { border-color: transparent !important; }
    .preview-mode [data-designer-container]::before { display: none !important; }
    .preview-mode [data-designer-container]:not(:has([data-designer-id]))::after { display: none !important; }
    .preview-mode [data-designer-label-badge] { display: none !important; }
    .preview-mode #floating-toolbar { display: none !important; }

    /* Spacing between designer elements so hover outlines don't overlap */
    [data-designer-id] + [data-designer-id] {
      margin-top: 4px;
    }

    /* ---- Selection & hover (all inside iframe) ---- */
    [data-designer-id]:hover {
      outline: 1px solid rgba(100, 170, 255, 0.5);
      outline-offset: 2px;
    }
    [data-designer-id].designer-selected,
    .designer-selected[data-designer-id],
    .contents.designer-selected[data-designer-id] {
      outline: 2px solid #3b97e3 !important;
      outline-offset: 2px !important;
      box-shadow: 0 0 0 4px rgba(59, 151, 227, 0.15) !important;
      border: 2px solid #3b97e3 !important;
    }
    [data-designer-id].designer-selected > [data-designer-label-badge] {
      display: block;
    }

    /* Badge shown on selected element */
    [data-designer-label-badge] {
      display: none;
      position: absolute; top: -20px; left: 0; z-index: 100;
      background: #3b97e3; color: #fff;
      font-size: 10px; padding: 1px 6px; border-radius: 3px;
      font-family: system-ui, sans-serif; white-space: nowrap;
      pointer-events: none;
    }

    /* Drop indicator */
    .drop-indicator {
      height: 3px; background: #3b97e3; border-radius: 2px;
      margin: 2px 0; pointer-events: none;
      position: relative;
    }
    .drop-indicator::before, .drop-indicator::after {
      content: ''; position: absolute; top: -3px;
      width: 8px; height: 8px; border-radius: 50%; background: #3b97e3;
    }
    .drop-indicator::before { left: -4px; }
    .drop-indicator::after { right: -4px; }

    /* Container drop highlight */
    [data-designer-container].drop-target {
      background: rgba(59, 130, 246, 0.06);
      border-color: rgba(100, 170, 255, 0.7);
    }

    /* Floating toolbar */
    #floating-toolbar {
      position: absolute; display: none;
      background: #ffffff; border-radius: 6px;
      padding: 4px; gap: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 200; flex-direction: row; align-items: center;
    }
    #floating-toolbar.visible { display: flex; }
    #floating-toolbar button {
      background: transparent; border: none; color: #555;
      cursor: pointer; padding: 4px 8px; border-radius: 4px;
      font-size: 14px; font-family: system-ui, sans-serif;
    }
    #floating-toolbar button:hover { background: #f0f0f0; color: #3b97e3; }
    #floating-toolbar .sep { width: 1px; height: 16px; background: #e0e0e0; margin: 0 2px; }
  </style>
  <!-- Edit-mode CSS injected by parent will go here -->
</head>
<body>
  <div id="editor-canvas"></div>

  <div id="floating-toolbar">
    <button data-action="preview" title="Preview this component">▶</button>
    <div class="sep"></div>
    <button data-action="move-up" title="Move Up">↑</button>
    <button data-action="move-down" title="Move Down">↓</button>
    <div class="sep"></div>
    <button data-action="duplicate" title="Duplicate">⧉</button>
    <button data-action="delete" title="Delete">✕</button>
  </div>

  <script type="module" src="../dist/wave-css.min.js"></script>
  <script>
  (function() {
    const canvas = document.getElementById('editor-canvas');
    const toolbar = document.getElementById('floating-toolbar');
    let componentRegistry = new Map();
    let sampleData = {};
    let selectedId = null;
    let idCounter = 0;
    let dropIndicator = null;
    let lastDropPosition = null;
    let lastDropParentId = null;

    const CONTAINER_TYPES = new Set([
      'div', 'fieldset', 'wc-form', 'wc-tab', 'wc-tab-item',
      'wc-accordion', 'wc-dropdown', 'wc-flip-box', 'wc-menu',
      'wc-sidebar', 'wc-sidenav', 'wc-slideshow', 'wc-split-button',
      'wc-breadcrumb',
    ]);

    const CONTAINER_LABELS = {
      'div': 'DIV', 'fieldset': 'FIELDSET', 'wc-form': 'FORM',
      'wc-tab': 'TABS', 'wc-tab-item': 'TAB ITEM', 'wc-accordion': 'ACCORDION',
      'wc-dropdown': 'DROPDOWN', 'wc-flip-box': 'FLIP BOX', 'wc-menu': 'MENU',
      'wc-sidebar': 'SIDEBAR', 'wc-sidenav': 'SIDENAV',
      'wc-slideshow': 'SLIDESHOW', 'wc-split-button': 'SPLIT BUTTON',
      'wc-breadcrumb': 'BREADCRUMB',
    };

    function generateId() { return `d${Date.now().toString(36)}${(idCounter++).toString(36)}`; }
    function isContainer(type) { return CONTAINER_TYPES.has(type); }

    // Resolve the inner content element for a container component.
    // Each Wave CSS component wraps its children in a specific inner element.
    // MUST use :scope > to avoid matching deeply nested descendants.
    function getInnerElement(el, type) {
      switch (type) {
        case 'wc-tab':        return el.querySelector(':scope > .wc-tab > .tab-body') || el;
        case 'wc-tab-item':   return el.querySelector(':scope > .wc-tab-item') || el;
        case 'wc-form':       return el.querySelector(':scope > .wc-form') || el;
        case 'wc-breadcrumb': return el.querySelector(':scope > .wc-breadcrumb') || el;
        case 'div':           return el.querySelector(':scope > .wc-div') || el;
        case 'wc-accordion':  return el.querySelector(':scope > .wc-accordion') || el;
        case 'wc-dropdown':   return el.querySelector(':scope > .wc-dropdown') || el;
        case 'wc-sidebar':    return el.querySelector(':scope > .wc-sidebar') || el;
        case 'wc-sidenav':    return el.querySelector(':scope > .wc-sidenav') || el;
        case 'wc-flip-box':   return el.querySelector(':scope > .wc-flip-box') || el;
        case 'wc-menu':       return el.querySelector(':scope > .wc-menu') || el;
        case 'wc-slideshow':  return el.querySelector(':scope > .wc-slideshow') || el;
        case 'wc-split-button': return el.querySelector(':scope > .wc-split-button') || el;
        case 'fieldset':      return el;
        default:              return el;
      }
    }
    function getNestedValue(obj, path) {
      return path.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : '', obj);
    }

    // =============================================
    // COMPONENT CREATION
    // =============================================

    function addComponent(type, parentId, position, properties = {}) {
      // Use provided _designerId (for loadTree) or generate a new one
      const designerId = properties._designerId || generateId();
      delete properties._designerId;
      const container = isContainer(type);

      // Build attribute string
      let attrs = `data-designer-id="${designerId}"`;
      if (container) {
        attrs += ` data-designer-container="true"`;
        attrs += ` data-designer-label="${CONTAINER_LABELS[type] || type.toUpperCase()}"`;
      }

      let textContent = '';
      let innerHTMLContent = null;

      for (const [key, value] of Object.entries(properties)) {
        if (key === 'scope') {
          attrs += ` data-scope="${value}"`;
        } else if (key === 'css') {
          if (value) attrs += ` class="${value}"`;
        } else if (key === 'style') {
          // Style is set directly, not transformed
          attrs += ` style="${String(value).replace(/"/g, '&quot;')}"`;
        } else if (key === '_') {
          // Hyperscript attribute — keep as underscore, don't transform
          attrs += ` _="${String(value).replace(/"/g, '&quot;')}"`;
        } else if (key === 'content') {
          textContent = value;
        } else if (key === 'innerHTML') {
          innerHTMLContent = value;
        } else if (value === '' || value === true) {
          attrs += ` ${key.replace(/_/g, '-')}`;
        } else if (value !== false && value != null) {
          attrs += ` ${key.replace(/_/g, '-')}="${String(value).replace(/"/g, '&quot;')}"`;
        }
      }

      // Create via innerHTML — include innerHTMLContent in the initial parse
      // so the component's constructor sees the children during initialization
      const childContent = innerHTMLContent || textContent;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<${type} ${attrs}>${childContent}</${type}>`;
      const el = wrapper.firstElementChild;

      if (!el) {
        console.error(`[canvas] Failed to create: ${type}`);
        return null;
      }

      // Add a selected-state badge element inside the component
      const badge = document.createElement('span');
      badge.setAttribute('data-designer-label-badge', '');
      badge.textContent = type;
      el.appendChild(badge);

      // Find the drop target — the actual content area inside the parent
      let parentEl;
      if (parentId) {
        const parentComp = canvas.querySelector(`[data-designer-id="${parentId}"]`);
        if (parentComp) {
          // Drop into the inner content element based on component type
          const parentEntry = componentRegistry.get(parentId);
          parentEl = parentEntry ? getInnerElement(parentComp, parentEntry.type) : parentComp;
        } else {
          parentEl = canvas;
        }
      } else {
        parentEl = canvas;
      }

      // Insert at position among designer children
      const children = Array.from(parentEl.children).filter(c => c.hasAttribute('data-designer-id'));
      if (position != null && position < children.length) {
        parentEl.insertBefore(el, children[position]);
      } else {
        parentEl.appendChild(el);
      }

      // Register
      componentRegistry.set(designerId, { element: el, type, properties: { ...properties } });

      // Apply sample data
      setTimeout(() => {
        const scope = properties.scope || el.getAttribute('data-scope');
        if (scope && Object.keys(sampleData).length > 0) {
          applySampleData(el, scope, type);
        }
      }, 200);

      postToParent('componentAdded', { designerId, type, properties });
      return designerId;
    }

    function removeComponent(designerId) {
      const entry = componentRegistry.get(designerId);
      if (!entry) return;
      entry.element.remove();
      componentRegistry.delete(designerId);
      if (selectedId === designerId) {
        selectedId = null;
        toolbar.classList.remove('visible');
      }
      postToParent('componentRemoved', { designerId });
      postToParent('deselect', {});
    }

    function updateProperty(designerId, propName, value) {
      const entry = componentRegistry.get(designerId);
      if (!entry) return;
      const el = entry.element;

      if (propName === 'scope') {
        el.setAttribute('data-scope', value);
        entry.properties.scope = value;
        applySampleData(el, value, entry.type);
      } else if (propName === 'css') {
        // Preserve designer classes
        const designerClasses = [];
        if (el.classList.contains('designer-selected')) designerClasses.push('designer-selected');
        if (el.classList.contains('contents')) designerClasses.push('contents');
        el.className = [value, ...designerClasses].filter(Boolean).join(' ');
        entry.properties.css = value;
      } else {
        const attrName = propName.replace(/_/g, '-');
        if (value === '' || value === true) el.setAttribute(attrName, '');
        else if (value === false || value == null) el.removeAttribute(attrName);
        else el.setAttribute(attrName, value);
        entry.properties[propName] = value;
      }
    }

    function moveComponent(designerId, direction) {
      const entry = componentRegistry.get(designerId);
      if (!entry) return;
      const el = entry.element;
      if (direction === 'up' && el.previousElementSibling?.hasAttribute('data-designer-id')) {
        el.parentElement.insertBefore(el, el.previousElementSibling);
      } else if (direction === 'down' && el.nextElementSibling?.hasAttribute('data-designer-id')) {
        el.parentElement.insertBefore(el.nextElementSibling, el);
      }
      if (selectedId === designerId) positionToolbar(el);
    }

    function duplicateComponent(designerId) {
      const entry = componentRegistry.get(designerId);
      if (!entry) return;
      const parent = entry.element.parentElement;
      const siblings = Array.from(parent.children).filter(c => c.hasAttribute('data-designer-id'));
      const position = siblings.indexOf(entry.element) + 1;
      // Find the designer parent ID
      const parentDesigner = parent.closest('[data-designer-id]');
      const parentDesignerId = parentDesigner?.getAttribute('data-designer-id') || null;
      addComponent(entry.type, parentDesignerId, position, { ...entry.properties });
    }

    // =============================================
    // SAMPLE DATA
    // =============================================

    function applySampleData(el, scope, type) {
      if (!scope || !sampleData || Object.keys(sampleData).length === 0) return;
      const value = getNestedValue(sampleData, scope);
      if (value === '' || value === undefined || value === null) return;
      const tag = (type || el.tagName).toLowerCase();

      if (tag === 'wc-input') {
        if (el.getAttribute('type') === 'checkbox') {
          if (value) el.setAttribute('checked', ''); else el.removeAttribute('checked');
        } else {
          el.setAttribute('value', String(value));
        }
      } else if (tag === 'wc-select') {
        el.setAttribute('value', String(value));
      } else if (tag === 'wc-textarea') {
        el.setAttribute('value', String(value));
      } else if (tag === 'wc-field') {
        el.setAttribute('value', String(value));
      }
    }

    function setSampleData(data) {
      sampleData = data || {};
      for (const [id, entry] of componentRegistry) {
        const scope = entry.properties.scope || entry.element.getAttribute('data-scope');
        if (scope) applySampleData(entry.element, scope, entry.type);
      }
    }

    // =============================================
    // SELECTION — all inside iframe
    // =============================================

    function selectComponent(designerId) {
      // Deselect previous and always exit preview
      exitPreview();
      if (selectedId) {
        const prev = componentRegistry.get(selectedId);
        if (prev) {
          prev.element.classList.remove('designer-selected');
          prev.element.style.outline = '';
          prev.element.style.outlineOffset = '';
          prev.element.style.boxShadow = '';
        }
      }

      selectedId = designerId;
      const entry = componentRegistry.get(designerId);
      if (!entry) return;

      entry.element.classList.add('designer-selected');
      // Apply selection styles via inline style (CSS classes don't work on display:contents elements)
      entry.element.style.outline = '2px solid #3b97e3';
      entry.element.style.outlineOffset = '2px';
      entry.element.style.boxShadow = '0 0 0 4px rgba(59, 151, 227, 0.15)';
      entry.element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      positionToolbar(entry.element);
      toolbar.classList.add('visible');

      // Show/hide preview button based on element type
      const previewBtn = toolbar.querySelector('[data-action="preview"]');
      const previewableTypes = new Set([
        'wc-input', 'wc-select', 'wc-textarea', 'wc-code-mirror',
        'wc-google-address', 'wc-vin-decoder', 'wc-ai-bot',
      ]);
      if (previewBtn) {
        const showPreview = previewableTypes.has(entry.type);
        previewBtn.style.display = showPreview ? '' : 'none';
        // Also hide the separator after it if preview is hidden
        const nextSep = previewBtn.nextElementSibling;
        if (nextSep?.classList.contains('sep')) {
          nextSep.style.display = showPreview ? '' : 'none';
        }
      }

      // Build ancestor path
      const ancestors = [];
      let current = entry.element;
      while (current && current !== canvas) {
        if (current.hasAttribute('data-designer-id')) {
          const aid = current.getAttribute('data-designer-id');
          const aEntry = componentRegistry.get(aid);
          if (aEntry) {
            ancestors.unshift({
              designerId: aid,
              type: aEntry.type,
              scope: current.getAttribute('data-scope') || ''
            });
          }
        }
        current = current.parentElement;
      }

      // Send to parent — read live attributes from DOM
      const el = entry.element;
      const props = { ...entry.properties };
      props.scope = el.getAttribute('data-scope') || '';
      props.name = el.getAttribute('name') || props.name || '';
      props['lbl-label'] = el.getAttribute('lbl-label') || props['lbl-label'] || '';
      props.required = el.hasAttribute('required');
      props.multiple = el.hasAttribute('multiple');
      props['toggle-switch'] = el.hasAttribute('toggle-switch');
      props['allow-dynamic'] = el.hasAttribute('allow-dynamic');
      props.type = el.getAttribute('type') || props.type || '';
      props.mode = el.getAttribute('mode') || props.mode || '';
      props.placeholder = el.getAttribute('placeholder') || props.placeholder || '';
      props.rows = el.getAttribute('rows') || props.rows || '';
      props.url = el.getAttribute('url') || props.url || '';
      props['display-member'] = el.getAttribute('display-member') || props['display-member'] || '';
      props['value-member'] = el.getAttribute('value-member') || props['value-member'] || '';
      props['data-lookup'] = el.getAttribute('data-lookup') || props['data-lookup'] || '';
      props['data-enum'] = el.getAttribute('data-enum') || props['data-enum'] || '';
      props['data-url-template'] = el.getAttribute('data-url-template') || props['data-url-template'] || '';
      props['data-url-depends'] = el.getAttribute('data-url-depends') || props['data-url-depends'] || '';
      props.items = el.getAttribute('items') || props.items || '';

      postToParent('select', { designerId, type: entry.type, properties: props, ancestors });
    }

    function deselectAll() {
      exitPreview();
      if (selectedId) {
        const prev = componentRegistry.get(selectedId);
        if (prev) {
          prev.element.classList.remove('designer-selected');
          prev.element.style.outline = '';
          prev.element.style.outlineOffset = '';
          prev.element.style.boxShadow = '';
        }
        selectedId = null;
        toolbar.classList.remove('visible');
        postToParent('deselect', {});
      }
    }

    function positionToolbar(el) {
      const rect = el.getBoundingClientRect();
      const toolbarH = 32;
      const toolbarW = 160; // approximate toolbar width

      let top = rect.top - toolbarH - 4 + window.scrollY;
      if (top < 0) top = rect.bottom + 4 + window.scrollY;

      // Keep toolbar within viewport horizontally
      let left = rect.right - toolbarW + window.scrollX;
      const maxLeft = document.documentElement.clientWidth - toolbarW - 8;
      if (left > maxLeft) left = maxLeft;
      if (left < 8) left = 8;

      toolbar.style.top = top + 'px';
      toolbar.style.left = left + 'px';
    }

    // Click handler
    canvas.addEventListener('click', (e) => {
      // If clicking inside a previewing element, don't interfere
      const previewingEl = previewingId ? componentRegistry.get(previewingId)?.element : null;
      if (previewingEl && previewingEl.contains(e.target)) {
        return; // Let the native interaction happen
      }

      const el = e.target.closest('[data-designer-id]');
      if (!el) {
        deselectAll();
        return;
      }
      e.preventDefault();
      e.stopPropagation();
      selectComponent(el.getAttribute('data-designer-id'));
    });

    // Toolbar actions
    let previewingId = null;

    function setPreviewEnabled(el, enabled) {
      // Set pointer-events on every form-interactive descendant
      const targets = el.querySelectorAll('input, select, textarea, button, [role="listbox"], [role="option"]');
      targets.forEach(t => {
        t.style.pointerEvents = enabled ? 'all' : '';
      });
      // Also set on the element itself and all descendants
      el.style.pointerEvents = enabled ? 'all' : '';
      el.querySelectorAll('*').forEach(child => {
        child.style.pointerEvents = enabled ? 'all' : '';
      });
    }

    function exitPreview() {
      if (previewingId) {
        const prev = componentRegistry.get(previewingId);
        if (prev) {
          prev.element.classList.remove('previewing');
          setPreviewEnabled(prev.element, false);
        }
        previewingId = null;
      }
      const previewBtn = toolbar.querySelector('[data-action="preview"]');
      if (previewBtn) { previewBtn.textContent = '▶'; previewBtn.title = 'Preview this component'; }
    }

    toolbar.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      const action = btn?.dataset.action;
      if (!action || !selectedId) return;
      e.stopPropagation();
      switch (action) {
        case 'preview':
          const entry = componentRegistry.get(selectedId);
          if (!entry) break;
          if (previewingId === selectedId) {
            exitPreview();
          } else {
            exitPreview();
            entry.element.classList.add('previewing');
            setPreviewEnabled(entry.element, true);
            previewingId = selectedId;
            btn.textContent = '✎';
            btn.title = 'Back to design mode';
          }
          break;
        case 'move-up': moveComponent(selectedId, 'up'); break;
        case 'move-down': moveComponent(selectedId, 'down'); break;
        case 'duplicate': duplicateComponent(selectedId); break;
        case 'delete': removeComponent(selectedId); break;
      }
    });

    // =============================================
    // DRAG & DROP — all inside iframe
    // =============================================

    // Accept drops from parent via native drag (parent disables iframe pointer-events,
    // then re-enables just before drop). This doesn't work well cross-frame.
    // INSTEAD: parent sends component data via postMessage and we handle positioning.

    // Accept native drops for when iframe pointer-events are enabled
    canvas.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';

      // Find deepest container under cursor and show indicator
      removeDropIndicator();
      clearDropTargets();
      const target = findDropTarget(e.clientX, e.clientY);

      // Save for the drop event
      lastDropPosition = target.position;
      lastDropParentId = target.parentId;

      if (target.container) {
        target.container.classList.add('drop-target');
      }
      showDropIndicator(target.parentEl, target.position);
    });

    canvas.addEventListener('dragleave', (e) => {
      if (!canvas.contains(e.relatedTarget)) {
        removeDropIndicator();
        clearDropTargets();
      }
    });

    canvas.addEventListener('drop', (e) => {
      e.preventDefault();

      // Remove indicator BEFORE calculating position so it doesn't shift elements
      const savedPosition = lastDropPosition;
      const savedParentId = lastDropParentId;
      removeDropIndicator();
      clearDropTargets();

      const jsonData = e.dataTransfer.getData('application/json');
      if (!jsonData) return;

      try {
        const payload = JSON.parse(jsonData);

        if (payload.preset && payload.tree) {
          // Preset drop — append tree at the drop position
          function appendPresetNodes(nodes, parentId) {
            for (const node of nodes) {
              const { componentType, type, children, ...properties } = node;
              const compType = componentType || type;
              const newId = addComponent(compType, parentId, null, properties);
              if (children && children.length > 0) {
                appendPresetNodes(children, newId);
              }
            }
          }
          appendPresetNodes(payload.tree, savedParentId);
          postToParent('treeAppended', {});
        } else if (payload.type) {
          // Single component drop
          addComponent(payload.type, savedParentId, savedPosition, payload.defaults || {});
        }
      } catch (err) {
        console.error('[canvas] Drop error:', err);
      }
    });

    function findDropTarget(clientX, clientY) {
      const elemAtPoint = document.elementFromPoint(clientX, clientY);

      // Walk up to find the nearest designer container
      let containerEl = elemAtPoint?.closest('[data-designer-container]');
      let parentId = null;

      // If we didn't directly hit a container, check if we hit an inner wrapper
      if (!containerEl && elemAtPoint) {
        const designerParent = elemAtPoint.closest('[data-designer-id]');
        if (designerParent?.hasAttribute('data-designer-container')) {
          containerEl = designerParent;
        }
      }

      if (containerEl) {
        parentId = containerEl.getAttribute('data-designer-id');
      }

      // Resolve parentEl to the actual insertion target (inner wrapper if present)
      // This MUST match what addComponent() uses for insertion
      let parentEl;
      if (containerEl) {
        const containerEntry = componentRegistry.get(parentId);
        parentEl = containerEntry ? getInnerElement(containerEl, containerEntry.type) : containerEl;
      } else {
        parentEl = canvas;
      }

      // Calculate position among designer children of the insertion target
      const children = Array.from(parentEl.children).filter(c => c.hasAttribute('data-designer-id'));
      let position = children.length;
      for (let i = 0; i < children.length; i++) {
        const rect = children[i].getBoundingClientRect();
        if (rect.height === 0) continue;
        if (clientY < rect.top + rect.height / 2) { position = i; break; }
      }

      return { container: containerEl, parentEl, parentId, position, clientY };
    }

    function showDropIndicator(parentEl, position, clientY) {
      dropIndicator = document.createElement('div');
      dropIndicator.className = 'drop-indicator';
      const children = Array.from(parentEl.children).filter(c => c.hasAttribute('data-designer-id'));
      if (position < children.length) {
        parentEl.insertBefore(dropIndicator, children[position]);
      } else {
        parentEl.appendChild(dropIndicator);
      }
    }

    function removeDropIndicator() {
      if (dropIndicator?.parentNode) dropIndicator.remove();
      dropIndicator = null;
      document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    }

    function clearDropTargets() {
      document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
    }

    // =============================================
    // SERIALIZATION
    // =============================================

    function serializeTree() { return serializeChildren(canvas); }

    function serializeChildren(parent) {
      const elements = [];
      for (const child of parent.children) {
        const designerId = child.getAttribute('data-designer-id');
        if (!designerId) continue;
        const entry = componentRegistry.get(designerId);
        if (!entry) continue;
        const node = { ...entry.properties, componentType: entry.type, designerId };
        if (isContainer(node.componentType)) {
          const innerEl = getInnerElement(child, node.componentType);
          const nested = serializeChildren(innerEl);
          if (nested.length > 0) node.children = nested;
        }
        elements.push(node);
      }
      return elements;
    }

    function extractHTML() {
      // Build clean HTML from the component registry — only output the
      // component tags with their attributes, not the internal rendered DOM.
      return extractChildren(canvas);
    }

    function extractChildren(parent) {
      let html = '';
      for (const child of parent.children) {
        const designerId = child.getAttribute('data-designer-id');
        if (!designerId) continue;
        const entry = componentRegistry.get(designerId);
        if (!entry) continue;

        // Build attributes from entry.properties (source of truth)
        // NOT from DOM attributes (which get polluted by component internals)
        const attrs = [];
        const skipProps = new Set(['scope', 'css', 'content', 'innerHTML']);

        // Add css as class if set
        if (entry.properties.css) {
          attrs.push(`class="${entry.properties.css}"`);
        }

        // Add data-scope
        const scope = entry.properties.scope || child.getAttribute('data-scope');
        if (scope) {
          attrs.push(`data-scope="${scope}"`);
        }

        // Add all other stored properties as attributes
        for (const [key, value] of Object.entries(entry.properties)) {
          if (skipProps.has(key)) continue;
          if (key.startsWith('data-designer') || key === 'data-wc-id') continue;
          if (value === '' || value === true) {
            attrs.push(key);
          } else if (value !== false && value != null) {
            attrs.push(`${key}="${value}"`);
          }
        }

        const attrStr = attrs.length ? ' ' + attrs.join(' ') : '';
        const tag = entry.type;

        // For containers, recurse into children
        if (isContainer(entry.type)) {
          const innerEl = getInnerElement(child, entry.type);
          const childHTML = extractChildren(innerEl);
          html += `<${tag}${attrStr}>${childHTML}</${tag}>`;
        } else if (entry.type === 'wc-select' || entry.type === 'wc-input') {
          // Use stored innerHTML from registry (source of truth) — never
          // query the rendered DOM, because wc-select creates an inner
          // <select> that duplicates the original <option> children.
          const stored = entry.properties.innerHTML;
          if (stored) {
            html += `<${tag}${attrStr}>\n${stored}\n</${tag}>`;
          } else {
            html += `<${tag}${attrStr}></${tag}>`;
          }
        } else if (entry.type === 'hr') {
          html += `<${tag}${attrStr}>`;
        } else {
          html += `<${tag}${attrStr}></${tag}>`;
        }
      }
      return html;
    }

    // =============================================
    // COMMUNICATION
    // =============================================

    function postToParent(action, data) {
      if (window.parent !== window) {
        window.parent.postMessage({ source: 'editor-bridge', action, ...data }, '*');
      }
    }

    window.addEventListener('message', (e) => {
      if (!e.data || e.data.source !== 'live-designer') return;
      switch (e.data.action) {
        case 'addComponent': addComponent(e.data.type, e.data.parentId, e.data.position, e.data.properties || {}); break;
        case 'removeComponent': removeComponent(e.data.designerId); break;
        case 'updateProperty': updateProperty(e.data.designerId, e.data.propName, e.data.value); break;
        case 'moveComponent': moveComponent(e.data.designerId, e.data.direction); break;
        case 'duplicateComponent': duplicateComponent(e.data.designerId); break;
        case 'setSampleData': setSampleData(e.data.data); break;
        case 'setTheme': document.documentElement.className = e.data.theme; break;
        case 'selectById':
          if (e.data.designerId && componentRegistry.has(e.data.designerId)) {
            selectComponent(e.data.designerId);
          }
          break;
        case 'clear-selection':
          deselectAll();
          break;
        case 'setPreviewMode':
          if (e.data.enabled) {
            // Enable all form interactions — user can click, type, open selects
            document.getElementById('editor-canvas').classList.add('preview-mode');
            deselectAll();
          } else {
            document.getElementById('editor-canvas').classList.remove('preview-mode');
          }
          break;
        case 'getTree': postToParent('treeResponse', { tree: serializeTree() }); break;
        case 'getHTML': postToParent('htmlResponse', { html: extractHTML() }); break;
        case 'clear':
          canvas.innerHTML = '';
          componentRegistry.clear();
          selectedId = null;
          toolbar.classList.remove('visible');
          break;
        case 'loadTree':
          // Clear and rebuild canvas from saved tree
          canvas.innerHTML = '';
          componentRegistry.clear();
          selectedId = null;
          toolbar.classList.remove('visible');
          // Async — each component needs time to render its internal DOM
          // (e.g., wc-tab creates .tab-body, wc-form creates .wc-form)
          // before children can be inserted into it.
          async function loadNodes(nodes, parentId) {
            for (const node of nodes) {
              const { componentType, type, designerId, children, ...properties } = node;
              const compType = componentType || type;
              const newId = addComponent(compType, parentId, null, { ...properties, type, _designerId: designerId });
              if (children && children.length > 0) {
                // Wait for the parent component to render its internal structure
                await new Promise(r => setTimeout(r, 150));
                await loadNodes(children, newId || designerId);
              }
            }
          }
          if (e.data.tree && Array.isArray(e.data.tree)) {
            loadNodes(e.data.tree, null).then(() => {
              // Delay refreshTabs — wc-tab's _restoreTabsWhenReady waits up
              // to 750ms+ before activating tabs, so we must run after that
              setTimeout(() => {
                refreshTabs();
                postToParent('treeLoaded', {});
              }, 1500);
            });
          }
          break;
        case 'appendTree':
          // Add nodes to canvas without clearing — used by presets
          async function appendNodes(nodes, parentId) {
            for (const node of nodes) {
              const { componentType, type, designerId, children, ...properties } = node;
              const compType = componentType || type;
              const newId = addComponent(compType, parentId, null, { ...properties, type });
              if (children && children.length > 0) {
                await new Promise(r => setTimeout(r, 150));
                await appendNodes(children, newId);
              }
            }
          }
          if (e.data.tree && Array.isArray(e.data.tree)) {
            appendNodes(e.data.tree, e.data.parentId || null).then(() => {
              setTimeout(() => {
                refreshTabs();
                postToParent('treeAppended', {});
              }, 1500);
            });
          }
          break;
      }
    });

    // After tree loading, wc-tab components need their button bars rebuilt
    // because tab-items were added after the tab initially rendered.
    function refreshTabs() {
      canvas.querySelectorAll('wc-tab[data-designer-id]').forEach(tab => {
        const wcTab = tab.querySelector(':scope > .wc-tab');
        if (!wcTab) return;
        const tabNav = wcTab.querySelector(':scope > .tab-nav');
        const tabBody = wcTab.querySelector(':scope > .tab-body');
        if (!tabNav || !tabBody) return;

        // Rebuild buttons from current tab-items
        const tabItems = tabBody.querySelectorAll(':scope > wc-tab-item');
        tabNav.innerHTML = '';
        tabItems.forEach((item, i) => {
          const label = item.getAttribute('label') || `Tab ${i + 1}`;
          const btn = document.createElement('button');
          btn.className = 'tab-link' + (item.classList.contains('active') ? ' active' : '');
          btn.dataset.label = label;
          btn.textContent = label;
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            // Deactivate all
            tabNav.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
            tabItems.forEach(ti => {
              ti.classList.remove('active');
              const inner = ti.querySelector(':scope > .wc-tab-item');
              if (inner) inner.classList.remove('active');
            });
            // Activate clicked
            btn.classList.add('active');
            item.classList.add('active');
            const inner = item.querySelector(':scope > .wc-tab-item');
            if (inner) inner.classList.add('active');
          });
          tabNav.appendChild(btn);
        });
      });
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (!selectedId) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); removeComponent(selectedId); }
      else if (e.key === 'Escape') deselectAll();
      else if (e.key === 'ArrowUp' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); moveComponent(selectedId, 'up'); }
      else if (e.key === 'ArrowDown' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); moveComponent(selectedId, 'down'); }
    });

    postToParent('canvasReady', {});
  })();
  </script>
</body>
</html>
